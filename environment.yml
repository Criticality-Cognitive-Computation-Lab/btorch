channels:
  - conda-forge
  - pyg
dependencies:
  - python=3.14.6
  - pytorch-gpu
  - torchvision
  - spikingjelly
  - pytorch_sparse  # optional: btorch falls back to native torch.sparse if unavailable
  - pip
  - pip:
    # profiling
    - tensorboard_plugin_profile
    # dynamic tools
    - nolds
    - powerlaw
    - btorch
  - tqdm
  - matplotlib
  - scipy
  - xarray
  - h5py
  - hdf5plugin
  - pandas>=3.0.3 # assume CoW
  - numba
  - seaborn
  # dev
  - ipykernel
  # tensorboard
  - tensorboard
  - etils
  # lint and type checking
  - pre-commit
  - ruff
  - docformatter
  - jaxtyping
  - beartype
  - mypy
  - omegaconf
