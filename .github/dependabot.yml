version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 30
    groups:
      github-actions:
        patterns: ["*"]
    commit-message:
      prefix: "ci(deps)"

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 30
    groups:
      python-deps:
        patterns: ["*"]
    commit-message:
      prefix: "deps"

  - package-ecosystem: "conda"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 30
    groups:
      conda-deps:
        patterns: ["*"]
    commit-message:
      prefix: "deps(conda)"
