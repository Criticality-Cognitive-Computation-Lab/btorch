name: Build docs

on:
  push:
    branches: [main]
  workflow_dispatch:
  pull_request:
    types: [labeled, synchronize, opened, reopened]
  workflow_call:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: >-
      ${{
        github.event_name != 'pull_request' ||
        contains(github.event.pull_request.labels.*.name, 'build-docs')
      }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch==2.8.0 --extra-index-url https://download.pytorch.org/whl/cpu
          python -m pip install git+https://github.com/alexfanqi/omegaconf.git
          python -m pip install torch_sparse torch_scatter -f https://data.pyg.org/whl/torch-2.8.0+cpu.html
          python -m pip install -e ".[docs]" torch==2.8.0 --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Build all languages
        run: python scripts/docs.py command=build-all

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
