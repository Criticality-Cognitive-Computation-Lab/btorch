name: Release

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish built distributions to PyPI"
        type: boolean
        default: false
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: latest

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Validate tagged release version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          case "${GITHUB_REF_NAME}" in
            v[0-9]* ) ;;
            * )
              echo "Expected a semantic-version tag like v0.1.0"
              exit 1
              ;;
          esac

      - name: Build distributions
        run: uv build

      - name: Upload distributions artifact
        uses: actions/upload-artifact@v7
        with:
          name: python-distributions
          path: dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    if: >-
      ${{
        (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
        github.event_name == 'release' ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
      }}
    environment:
      name: pypi
      url: https://pypi.org/p/btorch
    steps:
      - name: Download distributions artifact
        uses: actions/download-artifact@v8
        with:
          name: python-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1