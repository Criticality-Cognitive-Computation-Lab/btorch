name: Translate docs

on:
  workflow_dispatch:

permissions: {}

jobs:
  translate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch==2.8.0 --extra-index-url https://download.pytorch.org/whl/cpu
          python -m pip install git+https://github.com/alexfanqi/omegaconf.git
          python -m pip install torch_sparse torch_scatter -f https://data.pyg.org/whl/torch-2.8.0+cpu.html
          python -m pip install -e ".[docs]" torch==2.8.0 --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Detect changed files
        id: changed
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            SINCE="${{ github.event.before }}"
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            SINCE="origin/${{ github.base_ref }}"
          else
            SINCE=""
          fi
          echo "since=$SINCE" >> $GITHUB_OUTPUT
          if [ -n "$SINCE" ]; then
            README_CHANGED=$(git diff --name-only "$SINCE" HEAD -- README.md || true)
          else
            README_CHANGED=""
          fi
          if [ -n "$README_CHANGED" ]; then
            echo "readme_changed=true" >> $GITHUB_OUTPUT
          else
            echo "readme_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Translate README
        if: steps.changed.outputs.readme_changed == 'true' || github.event_name == 'workflow_dispatch'
        run: python scripts/translate.py command=translate-readme language=zh
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}

      - name: Translate changed pages
        if: steps.changed.outputs.since != '' || github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            python scripts/translate.py command=update-and-add language=zh max_pages=20
          else
            python scripts/translate.py command=translate-changed language=zh since_ref="${{ steps.changed.outputs.since }}" max_pages=20
          fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}

      - name: Add missing translations
        run: python scripts/translate.py command=add-missing language=zh max_pages=20
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}

      - name: Remove obsolete translations
        run: python scripts/translate.py command=remove-removable language=zh

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/zh/ README.zh.md
          if git diff --staged --quiet; then
            echo "No translation changes"
          else
            git commit -m "docs: update zh translations"
            git push origin ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
          fi

  build-docs:
    needs: translate
    if: always() && needs.translate.result == 'success'
    uses: ./.github/workflows/build-docs.yml
    permissions:
      contents: read
      pages: write
      id-token: write
